name: Veille emploi pilote

on:
  schedule:
    # Deux fois par jour : ~07h15 et ~15h15 heure de Paris (heure d'été).
    - cron: "15 5,13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: veille
  cancel-in-progress: false

jobs:
  veille:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r collecteur/requirements.txt

      - name: Collecter les nouvelles annonces
        run: python collecteur/collecte.py

      - name: Régénérer le site
        run: python collecteur/genere_site.py

      - name: Publier les mises à jour
        run: |
          git config user.name "veille-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data docs
          if git diff --cached --quiet; then
            echo "Aucune nouvelle annonce."
          else
            git commit -m "Mise à jour automatique de la veille"
            git push
          fi
